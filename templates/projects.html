{% extends "base.html" %}
{% block content %}
<section class="section">
  <div class="container">
    <h1 class="title is-2 has-text-centered">{{ section.title }}</h1>
    <p class="subtitle is-5 has-text-centered">{{ section.description }}</p>

    <div class="columns is-multiline is-variable is-4 mt-5">
      {% for page in section.pages %}
      <div class="column is-one-third">
        <a href="{{ page.permalink }}" class="card-link">
          <div class="card">
            {% if page.extra.thumbnail %}
            <div class="card-image">
              <figure class="image is-4by3">
                <img src="{{ page.permalink | safe }}{{ page.extra.thumbnail }}" alt="{{ page.title }}" />
              </figure>
            </div>
            {% endif %}
            <div class="card-content">
              <p class="title is-5">{{ page.title }}</p>
              <p class="subtitle is-6">{{ page.description }}</p>
            </div>
          </div>
        </a>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
{% endblock %}
